name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  #Run tests
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install test dependencies
        # Installs only what's needed to run the mocked unit tests.
        # Heavy deps (torch, chromadb, langchain) are mocked in tests/
        # so we deliberately skip requirements.txt here to keep CI fast.
        run: |
          pip install fastapi httpx pytest pytest-asyncio pydantic python-multipart

      - name: Run unit tests
        run: pytest tests/ -v

  # Build image and push to main branch only
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        # GHCR requires all-lowercase image names.
        # github.repository returns "HarshitaBhatia27/Ask-My-Docs" which has
        # uppercase letters — this step converts it to a valid image name.
        run: echo "IMAGE_NAME=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # auto-provided by GitHub, no setup needed

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # GitHub Actions cache keeps Docker layers between runs
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Render (runs after image is pushed) ──────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy API service to Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Deploy UI service to Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_UI }}"
